name: Importar precios

on:
  schedule:
    # Todos los días a las 8 AM hora Argentina (UTC-3 = 11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  importar-precios:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests supabase

      - name: Ejecutar importador de precios
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/importar_precios_claros.py
